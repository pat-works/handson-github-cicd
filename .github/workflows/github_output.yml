name: GITHUB_OUTPUT
on: push
jobs:
  share:
    runs-on: ubuntu-latest
    steps:
      - id: source  # ステップIDを設定
        run: echo "result=Hello" >> "${GITHUB_OUTPUT}"  # key:result, value:Hello を GITHUB_OUTPUT に書き出す
      - env:
          RESULT: ${{ steps.source.outputs.result }}    # stepsコンテキストから参照(steps.<step-id>.outputs.<key>)
        run: echo "${RESULT}"
          